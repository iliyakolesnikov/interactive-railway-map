<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МЖД · ОПЕРАТИВНАЯ КАРТА</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg-primary: #0b0d12;
  --bg-secondary: #0e1118;
  --bg-tertiary: #080c12;
  --border-color: #1e2535;
  --border-active: #e04030;
  --text-primary: #c0c8d0;
  --text-secondary: #8090a0;
  --text-muted: #3a4558;
  --accent: #e04030;
  --accent-glow: rgba(224,64,48,.3);
  --live-color: #27ae60;
  --shadow: rgba(0,0,0,.6);
  --tile-url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
  --section-text-light: #2d3748;
  --section-text-dark: #e2e8f0;
  --section-text-color: var(--section-text-dark);
}
body.theme-light {
  --bg-primary: #f0f2f5;
  --bg-secondary: #ffffff;
  --bg-tertiary: #e8eaed;
  --border-color: #d0d8e4;
  --border-active: #c0281a;
  --text-primary: #1a2030;
  --text-secondary: #4a5870;
  --text-muted: #8090a0;
  --accent: #c0281a;
  --accent-glow: rgba(192,40,26,.2);
  --live-color: #1a8040;
  --shadow: rgba(0,0,0,.2);
  --section-text-color: var(--section-text-light);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  display: flex;
}
/* SIDEBAR */
#sidebar {
  width: 290px;
  min-width: 290px;
  max-width: 650px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  z-index: 500;
}
.sidebar-left,
.sidebar-right {
  position: relative;
}
.resize-handle {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 6px;
  cursor: col-resize;
  background: rgba(128, 144, 160, 0.12);
  transition: background 0.2s ease;
  z-index: 650;
}
.resize-handle:hover {
  background: rgba(224, 64, 48, 0.3);
}
#left-resize-handle {
  right: -3px;
}
body.resizing {
  cursor: col-resize;
  user-select: none;
}
body.resizing #map {
  pointer-events: none;
}
#sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border-color);
}
#sidebar-header h1 {
  font-family: 'Share Tech Mono', monospace;
  font-size: 15px;
  color: var(--accent);
  letter-spacing: 1px;
}
#sidebar-header .ver {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}
/* Поиск */
#search-wrap {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  position: relative;
}
#search-input {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  outline: none;
  border-radius: 0;
}
#search-input:focus {
  border-color: var(--border-active);
}
#search-input::placeholder { color: var(--text-muted); }
#search-results {
  position: absolute;
  top: 100%;
  left: 16px;
  right: 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  max-height: 220px;
  overflow-y: auto;
  z-index: 600;
  display: none;
}
#search-results.show { display: block; }
.sr-item {
  padding: 8px 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--border-color);
  font-size: 13px;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: var(--accent-glow); }
.sr-item .sr-name { font-weight: 600; }
.sr-item .sr-type { font-size: 11px; color: var(--text-muted); }
/* Фильтры */
#filters-wrap {
  padding: 12px 16px;
  flex: 1;
  overflow-y: auto;
}
#filters-wrap::-webkit-scrollbar { width: 3px; }
#filters-wrap::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
.filter-title {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.filter-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 13px;
  cursor: pointer;
  user-select: none;
}
.filter-item input[type="checkbox"] {
  accent-color: var(--accent);
  cursor: pointer;
}
.filter-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
/* Легенда — закреплена вверху */
#legend-wrap {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--bg-secondary);
}
.legend-title {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-secondary);
  padding: 2px 0;
}
.legend-color {
  display: inline-block;
  width: 24px;
  height: 4px;
  border-radius: 2px;
  flex-shrink: 0;
}
#radial-legend-items {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
/* Фильтры — выпадающий список */
#filters-wrap {
  padding-top: 0;
}
.filters-toggle {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  margin-bottom: 0;
}
.filters-toggle:hover { border-color: var(--border-active); }
.filters-dropdown {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.filters-dropdown.open {
  max-height: 600px;
  padding-bottom: 12px;
}
/* Тултипы ж/д линий — через Leaflet bindTooltip, см. JS */
/* КАРТА */
#map-wrap {
  flex: 1;
  position: relative;
}
#map { width: 100%; height: 100%; }
/* Кнопки управления картой */
#zoom-ctrl {
  position: absolute;
  top: 16px;
  right: 16px;
  z-index: 400;
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 4px;
  border-radius: 8px;
  background: color-mix(in srgb, var(--bg-secondary) 86%, transparent);
  transition: flex-direction 0.3s ease, transform 0.3s ease;
}
#zoom-ctrl.map-controls-horizontal {
  flex-direction: row;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
}
.zb {
  width: 36px;
  height: 36px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Share Tech Mono', monospace;
}
.zb:hover { border-color: var(--border-active); }
.zb:first-child { border-radius: 4px 4px 0 0; }
.zb:last-child { border-radius: 0 0 4px 4px; }
/* Статус-строка */
#statusbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 28px;
  background: var(--bg-tertiary);
  border-top: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text-secondary);
  z-index: 700;
  gap: 20px;
}
#statusbar .sb-accent { color: var(--accent); }
#statusbar .sb-live { color: var(--live-color); }
/* Тултипы Leaflet */
.leaflet-tooltip {
  background: var(--bg-secondary) !important;
  border: 1px solid var(--border-color) !important;
  color: var(--text-secondary) !important;
  border-radius: 0 !important;
  font-family: 'Rajdhani', sans-serif !important;
  font-size: 12px !important;
}
/* Попапы Leaflet */
.leaflet-popup-content-wrapper {
  background: var(--bg-secondary) !important;
  border: 1px solid var(--border-color) !important;
  border-radius: 0 !important;
  box-shadow: 0 4px 16px var(--shadow) !important;
  color: var(--text-primary) !important;
  padding: 0 !important;
}
.leaflet-popup-content {
  margin: 0 !important;
  font-family: 'Rajdhani', sans-serif !important;
}
.leaflet-popup-tip-container { display: none !important; }
.leaflet-popup-close-button {
  color: var(--text-muted) !important;
  font-size: 18px !important;
  top: 6px !important;
  right: 8px !important;
}
.leaflet-popup-close-button:hover { color: var(--accent) !important; }
.mjd-popup { min-width: 190px; padding: 12px 32px 12px 14px; }
.mjd-popup-name { font-size: 14px; font-weight: 600; color: var(--text-primary); line-height: 1.3; margin-bottom: 4px; }
.mjd-popup-type { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.mjd-popup-row { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.mjd-popup-coords { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-muted); margin-top: 6px; }
/* Leaflet control zoom — скрыть стандартный */
.leaflet-control-zoom { display: none; }
.leaflet-div-icon.station-marker,
.leaflet-div-icon.mcc-marker {
  background: transparent;
  border: none;
}
.station-marker-shell,
.mcc-marker-shell {
  position: relative;
  width: 24px;
  height: 24px;
  display: grid;
  place-items: center;
  overflow: visible;
}
.station-marker-shell::after,
.mcc-marker-shell::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: transparent;
}
.station-marker-visual {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #a03020;
  border: 1px solid rgba(255, 255, 255, 0.75);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
}
.mcc-marker-visual {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #1a5898;
  border: 1px solid rgba(255, 255, 255, 0.75);
}
.pass-marker-visual {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #e67e22;
  border: 1px solid rgba(255, 255, 255, 0.75);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
}
.halt-marker-visual {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #7f8c8d;
  border: 1px solid rgba(255, 255, 255, 0.7);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4);
}
.node-marker-visual {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  background: #c0392b;
  border: 1px solid rgba(255, 255, 255, 0.75);
  transform: rotate(45deg);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
}
/* Станции и остановки МЖД */
.leaflet-div-icon.mjd-icon { background: transparent; border: none; }
.mjd-stop-icon circle:last-child { fill: #a0aec0; }
</style>
</head>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar-left">
  <div id="sidebar-header">

    </div>
  </div>
  <div class="resize-handle" id="left-resize-handle" aria-hidden="true"></div>
</div>

<!-- MAP -->
<div id="map-wrap">
  <div id="map"></div>
  <div id="zoom-ctrl">
    <button class="zb" id="zin" title="Приблизить">+</button>
    <button class="zb" id="zout" title="Отдалить">−</button>
    <button class="zb" id="zreset" title="Сбросить вид">⌂</button>
    <button class="zb" id="theme-toggle" title="Сменить тему">☾</button>
  </div>
</div>
<!-- STATUS BAR -->
<div id="statusbar">
  <span class="sb-accent">МЖД · ОПЕРАТИВНАЯ СИСТЕМА v2.6</span>

  <span id="sb-zoom">МАСШТАБ: 11</span>
</div>

<script src="mjd_osm_network.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
// ===== КАРТА =====
const map = L.map('map', { center:[55.7522,37.6156], zoom:11, zoomControl:false, minZoom:8, maxZoom:17 });

let tileLayer;
function applyTheme(dark) {
  isDark = dark;
  document.body.classList.toggle('theme-light', !dark);
  document.getElementById('theme-toggle').textContent = dark ? '☾' : '☀';
  if (tileLayer) map.removeLayer(tileLayer);
  const url = dark
    ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  tileLayer = L.tileLayer(url, {
    attribution: '&copy; OpenStreetMap contributors, &copy; CARTO',
    subdomains: 'abcd', maxZoom: 19, opacity: 0.85
  }).addTo(map);
  localStorage.setItem('mjd-theme', dark ? 'dark' : 'light');
}

let isDark = true;
const saved = localStorage.getItem('mjd-theme');
applyTheme(saved !== 'light');

// ===== РЕНДЕР СТАНЦИЙ И ОСТАНОВОК =====
const stationIcon = L.divIcon({
  className: 'mjd-icon',
  html: '<svg width="11" height="11" viewBox="0 0 11 11"><circle cx="5.5" cy="5.5" r="4.5" fill="#e04030" stroke="rgba(255,255,255,0.75)" stroke-width="1.5"/><circle cx="5.5" cy="5.5" r="1.8" fill="rgba(255,255,255,0.9)"/></svg>',
  iconSize: [11, 11], iconAnchor: [5, 5]
});
const stopIcon = L.divIcon({
  className: 'mjd-icon',
  html: '<svg width="11" height="11" viewBox="0 0 11 11"><circle cx="5.5" cy="5.5" r="4.5" fill="#4a5568" stroke="rgba(200,210,220,0.6)" stroke-width="1.5"/><circle cx="5.5" cy="5.5" r="2" fill="#a0aec0"/></svg>',
  iconSize: [11, 11], iconAnchor: [5, 5]
});

function renderStations(list) {
  LG.mjdStations.clearLayers();
  LG.mjdStops.clearLayers();
  for (const s of list) {
    const isStation = s.type === 'Станция';
    const icon = isStation ? stationIcon : stopIcon;
    const popup = `<div class="mjd-popup">
      <div class="mjd-popup-name">${s.name}</div>
      <div class="mjd-popup-type">${s.type || 'МЖД'}</div>
      ${s.line ? `<div class="mjd-popup-row">&#128205; ${s.line}</div>` : ''}
      <div class="mjd-popup-coords">${(+s.lat).toFixed(5)}, ${(+s.lon).toFixed(5)}</div>
    </div>`;
    L.marker([+s.lat, +s.lon], {icon, interactive: true})
      .bindTooltip(s.name, {permanent: false, direction: 'right', offset: [8, 0]})
      .bindPopup(popup, {maxWidth: 280, minWidth: 190})
      .addTo(isStation ? LG.mjdStations : LG.mjdStops);
  }
  document.getElementById('sb-count').textContent = 'ОБЪЕКТОВ: ' + list.length;
}

// OSM rail network — самый нижний слой, не интерактивный
if (typeof MJD_OSM_NETWORK !== 'undefined') {
  const segs = [];
  let cur = [];
  for (const pt of MJD_OSM_NETWORK) {
    if (pt === null) { if (cur.length >= 2) segs.push(cur); cur = []; }
    else cur.push(pt);
  }
  if (cur.length >= 2) segs.push(cur);
  if (segs.length) {
    L.polyline(segs, {color:'#8b7355', weight:1.5, opacity:0.5, interactive:false}).addTo(LG.osmNetwork);
  }
}

// ===== ФИЛЬТРЫ =====
const LAYER_MAP = {
  osmNetwork: 'osmNetwork',
  mjdStations: 'mjdStations',
  mjdStops: 'mjdStops',
};
function saveFilters() {
  const state = {};
  document.querySelectorAll('#filters-wrap input[type="checkbox"]').forEach(cb => {
    if (cb.dataset.layer) state[cb.dataset.layer] = cb.checked;
  });
  localStorage.setItem('mjd-filters', JSON.stringify(state));
}

function applyFilters() {
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem('mjd-filters') || '{}'); } catch(e) {}
  document.querySelectorAll('#filters-wrap input[type="checkbox"]').forEach(cb => {
    const key = cb.dataset.layer;
    if (!key || !(key in saved)) return;
    cb.checked = saved[key];
    const layers = LAYER_MAP[key];
    if (!layers) return;
    const arr = Array.isArray(layers) ? layers : [layers];
    arr.forEach(lg => {
      if (cb.checked) LG[lg].addTo(map);
      else map.removeLayer(LG[lg]);
    });
  });
}

document.querySelectorAll('#filters-wrap input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', () => {
    const key = cb.dataset.layer;
    if (!key || !LAYER_MAP[key]) { saveFilters(); return; }
    const layers = LAYER_MAP[key];
    const arr = Array.isArray(layers) ? layers : [layers];
    arr.forEach(lg => {
      if (cb.checked) LG[lg].addTo(map);
      else map.removeLayer(LG[lg]);
    });
    saveFilters();
  });
});
applyFilters();

function setupSidebarResize() {
  const left = document.getElementById('sidebar');
  const leftHandle = document.getElementById('left-resize-handle');
  const minWidth = 240;
  const maxWidth = 650;

  function bindHandle(handle, panel, side) {
    handle.addEventListener('mousedown', (event) => {
      event.preventDefault();
      const startX = event.clientX;
      const startWidth = panel.getBoundingClientRect().width;
      document.body.classList.add('resizing');

      function onMove(moveEvent) {
        const deltaX = moveEvent.clientX - startX;
        const rawWidth = side === 'left' ? startWidth + deltaX : startWidth - deltaX;
        const nextWidth = Math.max(minWidth, Math.min(maxWidth, rawWidth));
        panel.style.width = `${nextWidth}px`;
        panel.style.minWidth = `${nextWidth}px`;
      }

      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.body.classList.remove('resizing');
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  bindHandle(leftHandle, left, 'left');
}
setupSidebarResize();

// ===== СТАТУС-СТРОКА =====
function mskTime() {
  const now = new Date();
  // МСК = UTC+3
  const utc = now.getTime() + now.getTimezoneOffset()*60000;
  const msk = new Date(utc + 3*3600000);
  return msk.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function updateStatus() {
  document.getElementById('sb-time').textContent = mskTime() + ' МСК';
}
setInterval(updateStatus, 1000);
updateStatus();

  document.getElementById('sb-coords').textContent = e.latlng.lat.toFixed(4)+', '+e.latlng.lng.toFixed(4);
});
map.on('zoomend', () => {

});
});
