<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МЖД · ОПЕРАТИВНАЯ КАРТА</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg-primary: #0b0d12;
  --bg-secondary: #0e1118;
  --bg-tertiary: #080c12;
  --border-color: #1e2535;
  --border-active: #e04030;
  --text-primary: #c0c8d0;
  --text-secondary: #8090a0;
  --text-muted: #3a4558;
  --accent: #e04030;
  --accent-glow: rgba(224,64,48,.3);
  --live-color: #27ae60;
  --shadow: rgba(0,0,0,.6);
  --tile-url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
  --section-text-light: #2d3748;
  --section-text-dark: #e2e8f0;
  --section-text-color: var(--section-text-dark);
  --info-panel-top-offset: 70px;
}
body.theme-light {
  --bg-primary: #f0f2f5;
  --bg-secondary: #ffffff;
  --bg-tertiary: #e8eaed;
  --border-color: #d0d8e4;
  --border-active: #c0281a;
  --text-primary: #1a2030;
  --text-secondary: #4a5870;
  --text-muted: #8090a0;
  --accent: #c0281a;
  --accent-glow: rgba(192,40,26,.2);
  --live-color: #1a8040;
  --shadow: rgba(0,0,0,.2);
  --section-text-color: var(--section-text-light);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  display: flex;
}
/* SIDEBAR */
#sidebar {
  width: 290px;
  min-width: 290px;
  max-width: 650px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  z-index: 500;
}
.sidebar-left,
.sidebar-right {
  position: relative;
}
.resize-handle {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 6px;
  cursor: col-resize;
  background: rgba(128, 144, 160, 0.12);
  transition: background 0.2s ease;
  z-index: 650;
}
.resize-handle:hover {
  background: rgba(224, 64, 48, 0.3);
}
#left-resize-handle {
  right: -3px;
}
body.resizing {
  cursor: col-resize;
  user-select: none;
}
body.resizing #map {
  pointer-events: none;
}
#sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border-color);
}
#sidebar-header h1 {
  font-family: 'Share Tech Mono', monospace;
  font-size: 15px;
  color: var(--accent);
  letter-spacing: 1px;
}
#sidebar-header .ver {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}
/* Поиск */
#search-wrap {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
  position: relative;
}
#search-input {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  outline: none;
  border-radius: 0;
}
#search-input:focus {
  border-color: var(--border-active);
}
#search-input::placeholder { color: var(--text-muted); }
#search-results {
  position: absolute;
  top: 100%;
  left: 16px;
  right: 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  max-height: 220px;
  overflow-y: auto;
  z-index: 600;
  display: none;
}
#search-results.show { display: block; }
.sr-item {
  padding: 8px 12px;
  cursor: pointer;
  border-bottom: 1px solid var(--border-color);
  font-size: 13px;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: var(--accent-glow); }
.sr-item .sr-name { font-weight: 600; }
.sr-item .sr-type { font-size: 11px; color: var(--text-muted); }
/* Фильтры */
#filters-wrap {
  padding: 12px 16px;
  flex: 1;
  overflow-y: auto;
}
#filters-wrap::-webkit-scrollbar { width: 3px; }
#filters-wrap::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
.filter-title {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.filter-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 13px;
  cursor: pointer;
  user-select: none;
}
.filter-item input[type="checkbox"] {
  accent-color: var(--accent);
  cursor: pointer;
}
.filter-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
/* Легенда — закреплена вверху */
#legend-wrap {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border-color);
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--bg-secondary);
}
.legend-title {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-secondary);
  padding: 2px 0;
}
.legend-color {
  display: inline-block;
  width: 24px;
  height: 4px;
  border-radius: 2px;
  flex-shrink: 0;
}
#radial-legend-items {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
/* Фильтры — выпадающий список */
#filters-wrap {
  padding-top: 0;
}
.filters-toggle {
  width: 100%;
  padding: 8px 12px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  margin-bottom: 0;
}
.filters-toggle:hover { border-color: var(--border-active); }
.filters-dropdown {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.filters-dropdown.open {
  max-height: 600px;
  padding-bottom: 12px;
}
/* Тултипы ж/д линий — через Leaflet bindTooltip, см. JS */
/* КАРТА */
#map-wrap {
  flex: 1;
  position: relative;
}
#map { width: 100%; height: 100%; }
/* Кнопки управления картой */
#zoom-ctrl {
  position: absolute;
  top: 16px;
  right: 16px;
  z-index: 400;
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding: 4px;
  border-radius: 8px;
  background: color-mix(in srgb, var(--bg-secondary) 86%, transparent);
  transition: flex-direction 0.3s ease, transform 0.3s ease;
}
#zoom-ctrl.map-controls-horizontal {
  flex-direction: row;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
}
.zb {
  width: 36px;
  height: 36px;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Share Tech Mono', monospace;
}
.zb:hover { border-color: var(--border-active); }
.zb:first-child { border-radius: 4px 4px 0 0; }
.zb:last-child { border-radius: 0 0 4px 4px; }
/* INFO PANEL */
#info-panel {
  position: absolute;
  bottom: 36px;
  right: 16px;
  width: 330px;
  height: auto;
  max-height: calc(100vh - 120px);
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  z-index: 450;
  display: none;
  animation: slideIn 0.2s ease-out;
  transition: height 0.3s ease, transform 0.3s ease;
}
@keyframes slideIn {
  from { transform: translateX(12px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
#info-panel.show { display: block; }
#info-panel.fullscreen {
  top: var(--info-panel-top-offset);
  bottom: 36px;
  height: calc(100vh - var(--info-panel-top-offset) - 36px);
  max-height: none;
  width: min(420px, calc(100vw - 32px));
}
#ip-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border-color);
}
#ip-header h2 {
  font-size: 14px;
  font-weight: 600;
  flex: 1;
}
#ip-close, .ip-action {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 16px;
  cursor: pointer;
  line-height: 1;
  padding: 0 2px;
}
#ip-close { font-size: 20px; }
#ip-close:hover, .ip-action:hover { color: var(--accent); }
#ip-actions { display: flex; align-items: center; gap: 4px; }
#ip-toast {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  padding: 4px 10px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
#ip-type {
  font-size: 11px;
  color: var(--accent);
  padding: 0 14px;
  margin-top: 4px;
}
/* Табы */
#ip-tabs {
  display: flex;
  border-bottom: 1px solid var(--border-color);
}
.ip-tab {
  flex: 1;
  padding: 8px 0;
  text-align: center;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  color: var(--section-text-color);
  border-bottom: 2px solid transparent;
  transition: color 0.2s ease;
}
.ip-tab:hover { color: var(--text-primary); }
.ip-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
#ip-body {
  padding: 12px 14px;
  max-height: 320px;
  overflow-y: auto;
  font-size: 13px;
}
#ip-body::-webkit-scrollbar { width: 3px; }
#ip-body::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }
/* Таблица параметров */
.ip-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 12px;
}
.ip-grid .ip-label { color: var(--text-muted); font-size: 11px; }
.ip-grid .ip-value { color: var(--text-primary); font-family: 'Share Tech Mono', monospace; font-size: 12px; text-align: right; }
.ip-grid .ip-value.live { color: var(--live-color); }
/* Расписание */
.ip-sched-item {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px solid var(--border-color);
  font-size: 12px;
}
.ip-sched-item:last-child { border-bottom: none; }
.ip-sched-time { font-family: 'Share Tech Mono', monospace; color: var(--accent); }
.ip-sched-dest { color: var(--text-primary); }
.ip-sched-plat { color: var(--text-muted); }
/* Пульс */
.live-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  background: var(--live-color);
  border-radius: 50%;
  margin-right: 6px;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 var(--accent-glow); }
  70%  { box-shadow: 0 0 0 8px rgba(0,0,0,0); }
  100% { box-shadow: 0 0 0 0 rgba(0,0,0,0); }
}
/* Статус-строка */
#statusbar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 28px;
  background: var(--bg-tertiary);
  border-top: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  padding: 0 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--text-secondary);
  z-index: 700;
  gap: 20px;
}
#statusbar .sb-accent { color: var(--accent); }
#statusbar .sb-live { color: var(--live-color); }
/* Тултипы Leaflet */
.leaflet-tooltip {
  background: var(--bg-secondary) !important;
  border: 1px solid var(--border-color) !important;
  color: var(--text-secondary) !important;
  border-radius: 0 !important;
  font-family: 'Rajdhani', sans-serif !important;
  font-size: 12px !important;
}
/* Leaflet control zoom — скрыть стандартный */
.leaflet-control-zoom { display: none; }
.leaflet-div-icon.station-marker,
.leaflet-div-icon.mcc-marker {
  background: transparent;
  border: none;
}
.station-marker-shell,
.mcc-marker-shell {
  position: relative;
  width: 24px;
  height: 24px;
  display: grid;
  place-items: center;
  overflow: visible;
}
.station-marker-shell::after,
.mcc-marker-shell::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: transparent;
}
.station-marker-visual {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #a03020;
  border: 1px solid rgba(255, 255, 255, 0.75);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
}
.mcc-marker-visual {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #1a5898;
  border: 1px solid rgba(255, 255, 255, 0.75);
}
.pass-marker-visual {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #e67e22;
  border: 1px solid rgba(255, 255, 255, 0.75);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
}
.halt-marker-visual {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #7f8c8d;
  border: 1px solid rgba(255, 255, 255, 0.7);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.4);
}
.node-marker-visual {
  width: 8px;
  height: 8px;
  border-radius: 2px;
  background: #c0392b;
  border: 1px solid rgba(255, 255, 255, 0.75);
  transform: rotate(45deg);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.45);
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar-left">
  <div id="sidebar-header">
    <h1>МЖД · ОПЕРАТИВНАЯ КАРТА</h1>
    <div class="ver">v2.6</div>
  </div>
  <div id="legend-wrap">
    <div class="legend-title">Легенда</div>
    <div class="legend-item"><span class="filter-dot" style="background:#8b7355"></span>Пути МЖД</div>
  </div>
  <div id="filters-wrap">
    <button class="filters-toggle" id="filters-toggle">Фильтры ▼</button>
    <div class="filters-dropdown" id="filters-dropdown">
    <div class="filter-title" style="padding:8px 0 4px">Фильтры</div>
    <label class="filter-item"><input type="checkbox" checked data-layer="osmNetwork"><span class="filter-dot" style="background:#8b7355"></span>Пути МЖД</label>
    </div>
  </div>
  <div class="resize-handle" id="left-resize-handle" aria-hidden="true"></div>
</div>

<!-- MAP -->
<div id="map-wrap">
  <div id="map"></div>
  <div id="zoom-ctrl">
    <button class="zb" id="zin" title="Приблизить">+</button>
    <button class="zb" id="zout" title="Отдалить">−</button>
    <button class="zb" id="zreset" title="Сбросить вид">⌂</button>
    <button class="zb" id="theme-toggle" title="Сменить тему">☾</button>
  </div>
  <!-- INFO PANEL -->
  <div id="info-panel">
    <div id="ip-header">
      <h2 id="ip-title"></h2>
      <div id="ip-actions">
        <button class="ip-action" id="ip-copy" title="Копировать координаты">📋</button>
        <button class="ip-action" id="ip-maps" title="Открыть в Яндекс.Картах">🧭</button>
        <button id="ip-close">×</button>
      </div>
    </div>
    <div id="ip-toast">Скопировано</div>
    <div id="ip-type"></div>
    <div id="ip-tabs">
      <div class="ip-tab active" data-tab="params">Параметры</div>
      <div class="ip-tab" data-tab="live">Онлайн</div>
      <div class="ip-tab" data-tab="sched">Расписание</div>
    </div>
    <div id="ip-body"></div>
  </div>
</div>
<!-- STATUS BAR -->
<div id="statusbar">
  <span class="sb-accent">МЖД · ОПЕРАТИВНАЯ СИСТЕМА v2.6</span>
  <span id="sb-time">--:--:-- МСК</span>
  <span id="sb-coords">0.0000, 0.0000</span>
  <span id="sb-count">ОБЪЕКТОВ: 0</span>
  <span id="sb-zoom">МАСШТАБ: 11</span>
</div>

<script src="mjd_osm_network.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
// ===== КАРТА =====
const map = L.map('map', { center:[55.7522,37.6156], zoom:11, zoomControl:false, minZoom:8, maxZoom:17 });

let tileLayer;
function applyTheme(dark) {
  isDark = dark;
  document.body.classList.toggle('theme-light', !dark);
  document.getElementById('theme-toggle').textContent = dark ? '☾' : '☀';
  if (tileLayer) map.removeLayer(tileLayer);
  const url = dark
    ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  tileLayer = L.tileLayer(url, {
    attribution: '&copy; OpenStreetMap contributors, &copy; CARTO',
    subdomains: 'abcd', maxZoom: 19, opacity: 0.85
  }).addTo(map);
  localStorage.setItem('mjd-theme', dark ? 'dark' : 'light');
}

let isDark = true;
const saved = localStorage.getItem('mjd-theme');
applyTheme(saved !== 'light');

// ===== СЛОИ =====
const LG = {
  osmNetwork: L.layerGroup().addTo(map),
};

// ===== ЛИНИИ НА КАРТЕ =====
const RAILWAY_LINES = []; // для кликабельности

// OSM rail network — самый нижний слой, не интерактивный
if (typeof MJD_OSM_NETWORK !== 'undefined') {
  const segs = [];
  let cur = [];
  for (const pt of MJD_OSM_NETWORK) {
    if (pt === null) { if (cur.length >= 2) segs.push(cur); cur = []; }
    else cur.push(pt);
  }
  if (cur.length >= 2) segs.push(cur);
  if (segs.length) {
    L.polyline(segs, {color:'#8b7355', weight:1.5, opacity:0.5, interactive:false}).addTo(LG.osmNetwork);
  }
}

// OSM станции — маленькие кружки
// ===== ГРАНИЦА МОСКВЫ =====
fetch('https://nominatim.openstreetmap.org/search?q=Москва+город,Россия&polygon_geojson=1&format=json&limit=1',
  {headers:{'Accept-Language':'ru'}})
  .then(r=>r.json())
  .then(data => {
    if(data[0]?.geojson) {
      L.geoJSON(data[0].geojson, {style:{color:'#d0d8e4',weight:3.5,fillOpacity:0,opacity:0.9}}).addTo(map);
    }
  })
  .catch(()=>{});

// ===== INFO PANEL =====
let liveTimer = null;
let currentObj = null;
let currentTab = 'params';

function openInfoPanel(obj) {
  currentObj = obj;
  currentTab = 'params';
  clearInterval(liveTimer);

  document.getElementById('ip-title').textContent = obj.name;
  document.getElementById('ip-type').textContent = '';
  const infoPanel = document.getElementById('info-panel');
  const zoomCtrl = document.getElementById('zoom-ctrl');
  zoomCtrl.classList.add('map-controls-horizontal');
  infoPanel.classList.add('show', 'fullscreen');
  const topOffset = zoomCtrl.offsetTop + zoomCtrl.offsetHeight + 8;
  document.documentElement.style.setProperty('--info-panel-top-offset', `${topOffset}px`);

  // Обновить активный таб
  document.querySelectorAll('.ip-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === currentTab);
  });
  renderTab();

  // Если онлайн — запустить таймер
  if (currentTab === 'live') {
    startLive();
  }
}

function renderTab() {
  const body = document.getElementById('ip-body');
  document.querySelectorAll('.ip-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === currentTab);
  });
  if (currentTab === 'params') renderParams(body);
  else if (currentTab === 'live') { renderLive(body); startLive(); }
  else if (currentTab === 'sched') renderSched(body);
}

function renderParams(body) {
  clearInterval(liveTimer);
  const stats = currentObj.stats;
  let html = '';
  if (stats && Object.keys(stats).length) {
    html = '<div class="ip-grid">';
    for (const [k,v] of Object.entries(stats)) {
      const isLive = v === 'РАБОТАЕТ' || v === 'ДА';
      html += `<span class="ip-label">${k}</span><span class="ip-value${isLive?' live':''}">${v}</span>`;
    }
    html += '</div>';
  }
  if (currentObj.desc) {
    html += `<div style="margin-top:${html?'12px':'0'};color:var(--text-secondary);font-size:12px;line-height:1.5">${currentObj.desc}</div>`;
  }
  if (!html) {
    html = '<div style="color:var(--text-muted);font-size:12px">Справочная точка на карте.</div>';
  }
  body.innerHTML = html;
}

function rnd(a,b) { return Math.floor(Math.random()*(b-a+1))+a; }

function renderLive(body) {
  const o = currentObj;
  let html = '<div style="margin-bottom:8px;padding:6px 8px;background:rgba(180,120,0,.15);border:1px solid rgba(180,120,0,.4);font-size:11px;color:#c8960a"><b>⚠ DEMO-ДАННЫЕ</b> · цифры случайны, не для оперативного применения</div>';
  html += '<div class="ip-grid">';
  if (o.type === 'station') {
    html += kv('Поездов сейчас', rnd(4,14));
    html += kv('Перрон занят', `${rnd(2,8)} из ${o.stats['Платформ']||'?'}`);
    html += kv('Задержек', rnd(0,3));
    html += kv('Загрузка зала', rnd(20,80)+'%');
  } else if (o.type === 'depot') {
    html += kv('ПС в работе', rnd(30,70));
    html += kv('ПС в депо', rnd(10,30));
    html += kv('На ТО', rnd(2,8));
    html += kv('Персонал на смене', rnd(80,200)+' чел.');
  } else {
    html += kv('Вагонов на путях', rnd(40,150));
    html += kv('Обраб. состав', rnd(1,6));
    html += kv('Ожидание', rnd(0,4)+' сост.');
    html += kv('Готово к отпр.', rnd(1,5)+' сост.');
  }
  html += '</div>';
  body.innerHTML = html;
}
function kv(k,v) {
  return `<span class="ip-label">${k}</span><span class="ip-value live">${v}</span>`;
}

function startLive() {
  clearInterval(liveTimer);
  liveTimer = setInterval(() => {
    if (currentTab === 'live' && currentObj) {
      renderLive(document.getElementById('ip-body'));
    }
  }, 180000);
}

function renderSched(body) {
  clearInterval(liveTimer);
  body.innerHTML = '<div style="color:var(--text-muted);font-size:12px;padding:12px 0">Расписание недоступно</div>';
}

// Переключение табов
document.querySelectorAll('.ip-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    currentTab = tab.dataset.tab;
    if (currentTab !== 'live') clearInterval(liveTimer);
    renderTab();
  });
});

// Закрыть панель
document.getElementById('ip-close').addEventListener('click', () => {
  const infoPanel = document.getElementById('info-panel');
  const zoomCtrl = document.getElementById('zoom-ctrl');

  zoomCtrl.classList.remove('map-controls-horizontal');

  currentObj = null;
});

// Копировать координаты
document.getElementById('ip-copy').addEventListener('click', () => {

  navigator.clipboard.writeText(`${currentObj.lat}, ${currentObj.lng}`).then(() => {
    const toast = document.getElementById('ip-toast');
    toast.style.opacity = '1';

// Открыть в Яндекс.Картах
document.getElementById('ip-maps').addEventListener('click', () => {

  window.open(`https://yandex.ru/maps/?pt=${currentObj.lng},${currentObj.lat}&z=16&l=map`, '_blank');
});

// ===== ФИЛЬТРЫ =====
const LAYER_MAP = {
  osmNetwork: 'osmNetwork',
};
function saveFilters() {
  const state = {};
  document.querySelectorAll('#filters-wrap input[type="checkbox"]').forEach(cb => {
    if (cb.dataset.layer) state[cb.dataset.layer] = cb.checked;
  });
  localStorage.setItem('mjd-filters', JSON.stringify(state));
}

function applyFilters() {
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem('mjd-filters') || '{}'); } catch(e) {}
  document.querySelectorAll('#filters-wrap input[type="checkbox"]').forEach(cb => {
    const key = cb.dataset.layer;
    if (!key || !(key in saved)) return;
    cb.checked = saved[key];
    const layers = LAYER_MAP[key];
    if (!layers) return;
    const arr = Array.isArray(layers) ? layers : [layers];
    arr.forEach(lg => {
      if (cb.checked) LG[lg].addTo(map);
      else map.removeLayer(LG[lg]);
    });
  });
}

document.querySelectorAll('#filters-wrap input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', () => {
    const key = cb.dataset.layer;
    if (!key || !LAYER_MAP[key]) { saveFilters(); return; }
    const layers = LAYER_MAP[key];
    const arr = Array.isArray(layers) ? layers : [layers];
    arr.forEach(lg => {
      if (cb.checked) LG[lg].addTo(map);
      else map.removeLayer(LG[lg]);
    });
    saveFilters();
  });
});
applyFilters();

// Выпадающий список фильтров
document.getElementById('filters-toggle').addEventListener('click', () => {
  const dd = document.getElementById('filters-dropdown');
  const btn = document.getElementById('filters-toggle');

  btn.textContent = dd.classList.contains('open') ? 'Фильтры ▲' : 'Фильтры ▼';
});

document.getElementById('zout').addEventListener('click', () => map.zoomOut());

// ===== РЕСАЙЗ БОКОВЫХ ПАНЕЛЕЙ =====
function setupSidebarResize() {
  const left = document.getElementById('sidebar');
  const leftHandle = document.getElementById('left-resize-handle');
  const minWidth = 240;
  const maxWidth = 650;

  function bindHandle(handle, panel, side) {
    handle.addEventListener('mousedown', (event) => {
      event.preventDefault();
      const startX = event.clientX;
      const startWidth = panel.getBoundingClientRect().width;
      document.body.classList.add('resizing');

      function onMove(moveEvent) {
        const deltaX = moveEvent.clientX - startX;
        const rawWidth = side === 'left' ? startWidth + deltaX : startWidth - deltaX;
        const nextWidth = Math.max(minWidth, Math.min(maxWidth, rawWidth));
        panel.style.width = `${nextWidth}px`;
        panel.style.minWidth = `${nextWidth}px`;
      }

      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.body.classList.remove('resizing');
      }

      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  bindHandle(leftHandle, left, 'left');
}
setupSidebarResize();

// ===== СТАТУС-СТРОКА =====
function mskTime() {
  const now = new Date();
  // МСК = UTC+3
  const utc = now.getTime() + now.getTimezoneOffset()*60000;
  const msk = new Date(utc + 3*3600000);
  return msk.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function updateStatus() {
  document.getElementById('sb-time').textContent = mskTime() + ' МСК';
}
setInterval(updateStatus, 1000);
updateStatus();

map.on('mousemove', e => {
  document.getElementById('sb-coords').textContent = e.latlng.lat.toFixed(4)+', '+e.latlng.lng.toFixed(4);
});
map.on('zoomend', () => {
  document.getElementById('sb-zoom').textContent = 'МАСШТАБ: '+map.getZoom();
});
});
